# ⚠ SUPERSEDED (kept for reference) — this hand-written manifest was the May field trip. The
# CURRENT platform deploys via the chart: `bash deploy/eks/run.sh install cheap` renders this same
# keyless runtime (+ memory, quota, networkPolicy) from charts/agent-os with deploy/eks/eks-values.yaml,
# and `install full` brings the gateways + claims control plane the field trip predated. See README.md.
#
# agent-runtime on EKS — KEYLESS, running the ticket-bot agent with the full gate.
# The agent-runtime ServiceAccount is bound to the agent-os-eks-runtime IAM role by
# the podIdentityAssociation in cluster.yaml; the eks-pod-identity-agent injects
# fresh, auto-rotating creds — NO aws-creds Secret. That base role only assumes the
# per-tenant role (for Bedrock) + reaches DynamoDB; inference runs AS agentos-teama.
# Image is in ECR (EKS containerd can't see the local docker image).
---
apiVersion: v1
kind: Namespace
metadata:
  name: agent-os
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-runtime # bound to agent-os-eks-runtime by Pod Identity (no annotation needed)
  namespace: agent-os
---
# AUTHN=oidc-sa verifies callers' tokens via the TokenReview API — the runtime SA needs
# the built-in system:auth-delegator role to create TokenReviews (ADR-0019).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-runtime-token-review
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: agent-runtime
    namespace: agent-os
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-runtime-config
  namespace: agent-os
data:
  REGION: eu-west-2
  INFERENCE_PROVIDER: bedrock
  MODEL_ID: amazon.nova-lite-v1:0
  SANDBOX_PROVIDER: local # ticket-bot only uses http_request; no AgentCore dependency
  RUN_STORE: dynamodb
  RUNS_TABLE: agent-os-runs
  SPEND_STORE: dynamodb # durable monthly budget counter (ADR-0013)
  SPEND_TABLE: agent-os-budgets
  TELEMETRY: console
  # gate: authn = VERIFIED workload identity (ADR-0019); authz = OPA; budget from the claim
  GATE: local
  GATE_BUDGET_SOURCE: kube # reads the teama TenantInferenceProfile CR (cap)
  GATE_BUDGET_USD: "10" # fallback
  TENANT_ASSUME_ROLE: kube # inference runs AS agentos-teama (roleArn from the claim) — keyless
  # oidc-sa: the caller presents its projected ServiceAccount token; we TokenReview-verify
  # it (signature/audience/expiry) and resolve tenant from the SA→claim binding, NOT a
  # forgeable header claim (ADR-0019, retiring mesh-trust as the trust root).
  AUTHN: oidc-sa
  OIDC_SA_AUDIENCE: agent-os # callers must project their SA token for this audience
  AUTHZ: opa
  OPA_URL: http://localhost:8181/v1/data/agentos/authz
  # downstream = the bot's SERVICE-ACCOUNT creds (the user-vs-SA trade-off), at the mock svcs
  CRED_BROKER: local
  CRED_BROKER_CONFIG: '{"teama":{"slack":{"scheme":"bearer","token":"slack-sa-token","baseUrl":"http://mock-slack.agent-os.svc.cluster.local"},"jira":{"scheme":"bearer","token":"jira-sa-token","baseUrl":"http://mock-jira.agent-os.svc.cluster.local"}}}'
  AGENT_REGISTRY: memory
  AGENTS_JSON: |
    [
      {
        "name": "ticket-bot",
        "tenant": "teama",
        "maxSteps": 6,
        "systemPrompt": "You are ticket-bot, acting for a Slack user. Step 1: read the Slack thread by calling the http_request tool with target 'slack', path '/thread', method 'GET'. Step 2: open a Jira ticket by calling http_request with target 'jira', path '/rest/api/2/issue', method 'POST', and body set to a JSON string like {\"fields\":{\"project\":\"OPS\",\"summary\":\"<short summary of the issue>\",\"description\":\"<details>; requested by the Slack user\"}}. The platform attaches all credentials — you never provide or see them. After the ticket is created, reply with its key and stop."
      }
    ]
  # in-cluster: trust the cluster CA so the k8s client (Bun fetch) can read the claim
  NODE_EXTRA_CA_CERTS: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
---
# OPA policy for the sidecar (kept in sync with deploy/local/opa/authz.rego)
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policy
  namespace: agent-os
data:
  authz.rego: |
    package agentos.authz

    import rego.v1

    default allow := false

    allow if {
      input.action == "run:create"
      input.principal.tenant != "default"
      input.principal.subject != "anonymous"
      not sensitive_agent
    }

    allow if {
      input.action == "run:create"
      sensitive_agent
      "admins" in input.principal.groups
    }

    sensitive_agent if input.resource == "admin-bot"

    reason := "permitted" if allow

    reason := "unauthenticated principal" if {
      not allow
      input.principal.tenant == "default"
    }

    reason := sprintf("agent %q requires the 'admins' group", [input.resource]) if {
      not allow
      sensitive_agent
      input.principal.tenant != "default"
    }

    reason := sprintf("not permitted: %s / %s", [input.action, input.resource]) if {
      not allow
      not sensitive_agent
      input.principal.tenant != "default"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  namespace: agent-os
spec:
  replicas: 1
  selector:
    matchLabels: { app: agent-runtime }
  template:
    metadata:
      labels: { app: agent-runtime }
    spec:
      serviceAccountName: agent-runtime # keyless creds via Pod Identity
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: agent-runtime
          image: 233965347831.dkr.ecr.eu-west-2.amazonaws.com/agent-runtime:dev
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef: { name: agent-runtime-config } # NO secretRef — that's the point
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
        # OPA authz sidecar — queried over loopback (ADR-0015)
        - name: opa
          image: openpolicyagent/opa:latest
          args: ["run", "--server", "--addr=:8181", "--log-level=error", "/policy/authz.rego"]
          ports:
            - containerPort: 8181
          volumeMounts:
            - { name: opa-policy, mountPath: /policy, readOnly: true }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            httpGet: { path: /health, port: 8181 }
            initialDelaySeconds: 2
          resources:
            requests: { cpu: 10m, memory: 24Mi }
            limits: { cpu: 100m, memory: 64Mi }
      volumes:
        - name: opa-policy
          configMap: { name: opa-policy }
---
apiVersion: v1
kind: Service
metadata:
  name: agent-runtime
  namespace: agent-os
spec:
  selector: { app: agent-runtime }
  ports:
    - { port: 80, targetPort: 3000 }
