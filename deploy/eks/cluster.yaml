# Ephemeral EKS field trip (the "secure + scales" capstone). Reproducible IaC:
#   eksctl create cluster -f deploy/eks/cluster.yaml --profile nathan-tilsley-developer
#   eksctl delete  cluster -f deploy/eks/cluster.yaml --profile nathan-tilsley-developer
#
# The point: KEYLESS identity via Pod Identity (no aws-creds Secret, nothing to
# expire) — the podIdentityAssociation below binds the agent-os/agent-runtime
# ServiceAccount to a scoped IAM role. Version omitted on purpose: eksctl picks a
# current, standard-support k8s version (avoids extended-support pricing).
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: agent-os
  region: eu-west-2

# Pod Identity: SA -> scoped role, no aws-creds Secret. TWO associations, one per deploy
# profile (deploy/eks/run.sh cheap|full) — both keyless, both harmless when the other
# profile is the one running (an unbound role is just unused):
#
#   CHEAP profile (eks-values.yaml): the agent-runtime SA calls Bedrock itself, via the
#   keyless base -> per-tenant chain — it assumes agentos-<tenant> (which holds the scoped
#   invoke) and reaches the run + budget tables. The field-trip path (ADR-0014).
#
#   FULL profile (eks-full-values.yaml): the runtime holds NOTHING (think/do go through the
#   gateways, stores are in-memory). The inference-gateway SA is the sole Bedrock holder and
#   invokes Haiku directly with its own identity — no per-tenant assume, the gateway is the
#   chokepoint (ADR-0019/0028).
iam:
  podIdentityAssociations:
    # — CHEAP profile — keyless base that assumes the per-tenant role + reaches the tables.
    - namespace: agent-os
      serviceAccountName: agent-runtime
      roleName: agent-os-eks-runtime
      permissionPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AssumePerTenantRole
            # sts:TagSession is REQUIRED, not optional: EKS Pod Identity attaches
            # transitive session tags (eks-cluster-arn, namespace, SA) to the base
            # identity, and they auto-forward on any downstream AssumeRole — so the
            # chained call carries tags and AWS demands TagSession on both the caller
            # policy (here) and the target role's trust (agentos-<tenant>). (ADR-0014)
            Effect: Allow
            Action: ["sts:AssumeRole", "sts:TagSession"]
            # NOT agentos-* — isolation requires the runtime to assume ONLY the exact
            # tenant roles it serves (ADR-0019). The controller maintains this list as
            # tenants onboard; here it's the slice-1 tenant (teama). A compromised
            # runtime cannot reach any other tenant's role.
            Resource:
              - "arn:aws:iam::233965347831:role/agentos-teama"
          - Sid: StateAndBudget
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:Query
              - dynamodb:Scan # GET /runs lists all runs (proven needed on the field trip)
            Resource:
              - arn:aws:dynamodb:eu-west-2:233965347831:table/agent-os-runs
              - arn:aws:dynamodb:eu-west-2:233965347831:table/agent-os-runs/index/*
              - arn:aws:dynamodb:eu-west-2:233965347831:table/agent-os-budgets
    # — FULL profile — the inference gateway is the sole model-cred holder (keyless, direct
    # Haiku invoke). Unused by the cheap profile (no inference-gateway pod), which is fine.
    - namespace: agent-os
      serviceAccountName: inference-gateway
      roleName: agent-os-eks-inference-gateway
      permissionPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: InvokeHaiku
            Effect: Allow
            Action: ["bedrock:InvokeModel", "bedrock:InvokeModelWithResponseStream"]
            # The eu inference profile fans out across the region group, so the grant needs
            # BOTH the profile ARN and the underlying foundation-model ARNs in those regions
            # (account-Marketplace subscription is separate + already in place — ADR-0007).
            Resource:
              - arn:aws:bedrock:eu-west-2:233965347831:inference-profile/eu.anthropic.claude-haiku-4-5-20251001-v1:0
              - arn:aws:bedrock:eu-west-1::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0
              - arn:aws:bedrock:eu-west-2::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0
              - arn:aws:bedrock:eu-west-3::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0
              - arn:aws:bedrock:eu-central-1::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0

addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: eks-pod-identity-agent # required for Pod Identity
  # durable `remember` (ADR-0030): the memory PVC needs a real CSI driver to bind a volume.
  # Keyless too — useDefaultPodIdentityAssociations makes eksctl create the controller SA's Pod
  # Identity with the managed AmazonEBSCSIDriverPolicy (the addon's own recommended association).
  - name: aws-ebs-csi-driver
    useDefaultPodIdentityAssociations: true

managedNodeGroups:
  - name: ng-1
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 1
    maxSize: 4 # headroom for the Karpenter/HPA scale demo
    volumeSize: 20
