# Per-tenant isolation set — the k8s side of the `gate` control.
# On this POC there's one namespace (`agent-os`); in prod you'd stamp this set out
# per team. ResourceQuota = the tenant's compute budget (pairs with the per-tenant
# $ budget in gate/ADR-0009); NetworkPolicy = containment. Apply this before the
# workload (agent-runtime.yaml).
apiVersion: v1
kind: Namespace
metadata:
  name: agent-os
  labels:
    agent-os/tenant: platform
---
# Caps the namespace's total compute so one tenant can't exhaust the cluster.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: agent-os
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "10"
---
# Default requests/limits so every pod is bounded even if it omits them.
apiVersion: v1
kind: LimitRange
metadata:
  name: defaults
  namespace: agent-os
spec:
  limits:
    - type: Container
      default: { cpu: 250m, memory: 256Mi }
      defaultRequest: { cpu: 100m, memory: 128Mi }
---
# Ingress containment (default-deny except :3000 from the namespace) + egress.
# LESSON: k3s DOES enforce NetworkPolicy (built-in kube-router controller — plain
# flannel wouldn't). A tight egress allowlist refused the pod's k8s API-server
# connection: the API is reached via 10.43.0.1:443 but DNATs to the host on :6443,
# and port-based egress doesn't reliably match that path under kube-router. Egress
# to the API server is CNI-specific — properly done with Calico/Cilium policies on
# EKS. So here we contain INGRESS and leave egress open (with the caveat documented).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-runtime
  namespace: agent-os
spec:
  podSelector:
    matchLabels: { app: agent-runtime }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: {} # same namespace only
      ports:
        - { port: 3000, protocol: TCP }
  egress:
    - {} # allow all egress (see lesson above — fine-grained egress is CNI-specific)
