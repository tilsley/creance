# Per-tenant isolation set — the k8s side of the `gate` control.
# On this POC there's one namespace (`agent-os`); in prod you'd stamp this set out
# per team. ResourceQuota = the tenant's compute budget (pairs with the per-tenant
# $ budget in gate/ADR-0009); NetworkPolicy = containment. Apply this before the
# workload (agent-runtime.yaml).
apiVersion: v1
kind: Namespace
metadata:
  name: agent-os
  labels:
    agent-os/tenant: platform
---
# Caps the namespace's total compute so one tenant can't exhaust the cluster.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: agent-os
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "10"
---
# Default requests/limits so every pod is bounded even if it omits them.
apiVersion: v1
kind: LimitRange
metadata:
  name: defaults
  namespace: agent-os
spec:
  limits:
    - type: Container
      default: { cpu: 250m, memory: 256Mi }
      defaultRequest: { cpu: 100m, memory: 128Mi }
---
# Default-deny + scoped egress (DNS + HTTPS to AWS). The network side of containment.
# NOTE: k3s' default flannel CNI does NOT enforce NetworkPolicy — install Calico (or
# a policy-enforcing CNI) for it to bite; on EKS the VPC CNI + Calico enforce it.
# Included here to learn the object; enforcement needs the right CNI.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-runtime
  namespace: agent-os
spec:
  podSelector:
    matchLabels: { app: agent-runtime }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: {} # same namespace only
      ports:
        - { port: 3000, protocol: TCP }
  egress:
    - ports: # DNS
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
    - ports: # HTTPS — Bedrock / AgentCore / DynamoDB
        - { port: 443, protocol: TCP }
