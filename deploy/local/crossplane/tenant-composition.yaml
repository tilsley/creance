# Composition — expands one TenantInferenceProfile claim into a full per-tenant
# bundle of AWS resources. v2 Compositions are function pipelines (no inline
# resources); this uses function-patch-and-transform. One claim now composes:
#   1. profile     — a Bedrock application inference profile (cost-attribution unit)
#   2. policy      — a scoped IAM policy (least-privilege Bedrock invoke for the team)
#   3. role        — the tenant's IAM principal (runtime assumes it per run; ADR-0014)
#   4. attachment  — binds the scoped policy (#2) to the tenant role (#3)
#   5. budget      — an AWS Budget on the team's tagged spend (cost guardrail)
#   6-9. backstop  — deny policy + Budgets execution role (+inline policy) + a
#        BudgetAction that auto-attaches the deny to the tenant role at 100% (0014 §3)
# This is the "self-service, no code per team" promise: a team writes ~3 lines of
# intent and Crossplane provisions the identity + governance scaffolding.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: tenantinferenceprofile
spec:
  compositeTypeRef:
    apiVersion: platform.agent-os.io/v1alpha1
    kind: TenantInferenceProfile
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: profile
            base:
              apiVersion: bedrock.aws.upbound.io/v1beta1
              kind: InferenceProfile
              spec:
                forProvider:
                  region: eu-west-2
                  description: Provisioned by Crossplane for agent-os
                  modelSource:
                    - copyFrom: placeholder
                  tags:
                    managedBy: agent-os
            patches:
              # profile name = agentos-<tenant>
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: spec.forProvider.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "agentos-%s" }
              # cost-attribution tag
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: spec.forProvider.tags.team
              # copyFrom = foundation-model ARN built from baseModel
              - type: FromCompositeFieldPath
                fromFieldPath: spec.baseModel
                toFieldPath: spec.forProvider.modelSource[0].copyFrom
                transforms:
                  - type: string
                    string: { type: Format, fmt: "arn:aws:bedrock:eu-west-2::foundation-model/%s" }
              # surface the AWS-assigned profile id back on the claim
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.id
                toFieldPath: status.profileId

          # 2. Scoped IAM policy — least-privilege Bedrock invoke for this tenant.
          # IAM is global (no region). The policy doc is static here: it's scoped to
          # inference-profile + foundation-model invoke + ApplyGuardrail. We can't
          # narrow the Resource to *this* profile's ARN because the profile id is
          # generated at create-time (cross-resource ARN patches are fiddly); a
          # follow-up could use the composite status.profileId once it's known.
          - name: policy
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: Policy
              metadata:
                labels: { agentos.io/component: bedrock-policy } # disambiguate from the deny policy
              spec:
                forProvider:
                  description: agent-os tenant Bedrock invoke policy (Crossplane-managed)
                  policy: |
                    {
                      "Version": "2012-10-17",
                      "Statement": [
                        {
                          "Sid": "InvokeBedrock",
                          "Effect": "Allow",
                          "Action": ["bedrock:InvokeModel", "bedrock:InvokeModelWithResponseStream"],
                          "Resource": [
                            "arn:aws:bedrock:eu-west-2::foundation-model/*",
                            "arn:aws:bedrock:eu-west-2:*:inference-profile/*",
                            "arn:aws:bedrock:eu-west-2:*:application-inference-profile/*"
                          ]
                        },
                        {
                          "Sid": "ApplyGuardrail",
                          "Effect": "Allow",
                          "Action": "bedrock:ApplyGuardrail",
                          "Resource": "arn:aws:bedrock:eu-west-2:*:guardrail/*"
                        }
                      ]
                    }
                  tags:
                    managedBy: agent-os
            patches:
              # policy name = agentos-<tenant>-bedrock. The IAM policy name is the
              # AWS identity, so it's set via the external-name annotation (this MR
              # has no spec.forProvider.name field).
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                transforms:
                  - type: string
                    string: { type: Format, fmt: "agentos-%s-bedrock" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: spec.forProvider.tags.team
              # surface the policy ARN back on the claim
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.arn
                toFieldPath: status.policyArn

          # 3. Per-tenant IAM role — the tenant's cloud principal (ADR-0014). The
          # runtime assumes this role per run (STS, keyless) so a tenant's model
          # calls run as *the tenant*, not the platform's ambient creds; it's also
          # the target the Budget Action attaches a Deny to when the cap is blown.
          # Trust is delegated to the account root — the assuming principal (the
          # runtime user locally / agent-os-runtime role on EKS) gates assumption
          # via its own sts:AssumeRole permission. IAM is global (name via
          # external-name annotation, like the policy).
          - name: role
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: Role
              metadata:
                labels: { agentos.io/component: tenant-role } # the principal the runtime assumes
              spec:
                forProvider:
                  assumeRolePolicy: |
                    {
                      "Version": "2012-10-17",
                      "Statement": [
                        {
                          "Effect": "Allow",
                          "Principal": { "AWS": "arn:aws:iam::233965347831:root" },
                          "Action": "sts:AssumeRole"
                        }
                      ]
                    }
                  tags:
                    managedBy: agent-os
            patches:
              # role name = agentos-<tenant>
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                transforms:
                  - type: string
                    string: { type: Format, fmt: "agentos-%s" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: spec.forProvider.tags.team
              # surface the role ARN back on the claim (the runtime resolves it per run)
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.arn
                toFieldPath: status.roleArn

          # 4. Attach the scoped Bedrock policy (#2) to the tenant role (#3). Now that
          # the claim composes multiple roles + policies, the selectors pin the exact
          # ones by label (matchControllerRef scopes to THIS claim; matchLabels picks
          # the component within it).
          - name: role-policy-attachment
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: RolePolicyAttachment
              spec:
                forProvider:
                  roleSelector:
                    matchControllerRef: true
                    matchLabels: { agentos.io/component: tenant-role }
                  policyArnSelector:
                    matchControllerRef: true
                    matchLabels: { agentos.io/component: bedrock-policy }

          # 5. AWS Budget — a monthly cost cap on the tenant's tagged spend.
          # Budgets is global (no region). costFilter matches the `team:<tenant>`
          # cost-allocation tag (legacy "user:<key>$<value>" syntax). limitAmount
          # comes from the claim's monthlyBudgetUsd.
          - name: budget
            base:
              apiVersion: budgets.aws.upbound.io/v1beta2
              kind: Budget
              spec:
                forProvider:
                  budgetType: COST
                  limitUnit: USD
                  timeUnit: MONTHLY
                  costFilter:
                    - name: TagKeyValue
                      values:
                        - placeholder
                  tags:
                    managedBy: agent-os
            patches:
              # budget name = agentos-<tenant>-monthly. Like the policy, the budget
              # name is the AWS identity, set via the external-name annotation.
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                transforms:
                  - type: string
                    string: { type: Format, fmt: "agentos-%s-monthly" }
              # limit = claim's monthlyBudgetUsd
              - type: FromCompositeFieldPath
                fromFieldPath: spec.monthlyBudgetUsd
                toFieldPath: spec.forProvider.limitAmount
              # cost filter matches the team cost-allocation tag
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: spec.forProvider.costFilter[0].values[0]
                transforms:
                  - type: string
                    string: { type: Format, fmt: "user:team$%s" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: spec.forProvider.tags.team

          # ---- ADR-0014 step 3: the cloud-side Budget Action Deny backstop ----
          # 6. Budget-deny policy — an explicit Deny on Bedrock invoke. Inert until
          # attached; the Budget Action (#9) attaches it to the tenant role when the
          # cap is breached. Explicit Deny overrides the allow (#2), so the tenant
          # loses model access cloud-side until remediated — defense in depth under
          # the app admission gate (ADR-0013).
          - name: deny-policy
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: Policy
              metadata:
                labels: { agentos.io/component: deny-policy }
              spec:
                forProvider:
                  description: agent-os tenant budget-exceeded Bedrock deny (Crossplane-managed)
                  policy: |
                    {
                      "Version": "2012-10-17",
                      "Statement": [
                        {
                          "Sid": "DenyBedrockOverBudget",
                          "Effect": "Deny",
                          "Action": ["bedrock:InvokeModel", "bedrock:InvokeModelWithResponseStream"],
                          "Resource": "*"
                        }
                      ]
                    }
                  tags:
                    managedBy: agent-os
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                transforms:
                  - type: string
                    string: { type: Format, fmt: "agentos-%s-budget-deny" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: spec.forProvider.tags.team

          # 7. Budget Action execution role — the identity AWS Budgets assumes to
          # carry out the action. Trusts the budgets service principal.
          - name: budget-exec-role
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: Role
              metadata:
                labels: { agentos.io/component: budget-exec-role }
              spec:
                forProvider:
                  assumeRolePolicy: |
                    {
                      "Version": "2012-10-17",
                      "Statement": [
                        {
                          "Effect": "Allow",
                          "Principal": { "Service": "budgets.amazonaws.com" },
                          "Action": "sts:AssumeRole"
                        }
                      ]
                    }
                  tags:
                    managedBy: agent-os
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                transforms:
                  - type: string
                    string: { type: Format, fmt: "agentos-%s-budget-exec" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: spec.forProvider.tags.team

          # 8. Inline policy on the execution role — lets Budgets attach/detach the
          # deny policy to the tenant role. Scoped to this account's agentos-* roles.
          - name: budget-exec-policy
            base:
              apiVersion: iam.aws.upbound.io/v1beta1
              kind: RolePolicy
              spec:
                forProvider:
                  roleSelector:
                    matchControllerRef: true
                    matchLabels: { agentos.io/component: budget-exec-role }
                  policy: |
                    {
                      "Version": "2012-10-17",
                      "Statement": [
                        {
                          "Effect": "Allow",
                          "Action": ["iam:AttachRolePolicy", "iam:DetachRolePolicy"],
                          "Resource": "arn:aws:iam::233965347831:role/agentos-*"
                        }
                      ]
                    }
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenant
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                transforms:
                  - type: string
                    string: { type: Format, fmt: "agentos-%s-budget-exec-attach" }

          # 9. The Budget Action — the armed backstop. At 100% of ACTUAL monthly
          # spend, Budgets (via the execution role #7) auto-attaches the deny policy
          # (#6) to the tenant role (#3). AUTOMATIC = no manual approval. It lags
          # hours, so it's the cloud-side backstop UNDER the immediate app gate.
          - name: budget-action
            base:
              apiVersion: budgets.aws.upbound.io/v1beta2
              kind: BudgetAction
              spec:
                forProvider:
                  actionType: APPLY_IAM_POLICY
                  approvalModel: AUTOMATIC
                  notificationType: ACTUAL
                  # v1beta2: actionThreshold + definition are objects (not lists)
                  actionThreshold:
                    actionThresholdType: PERCENTAGE
                    actionThresholdValue: 100
                  budgetNameSelector:
                    matchControllerRef: true
                  executionRoleArnSelector:
                    matchControllerRef: true
                    matchLabels: { agentos.io/component: budget-exec-role }
                  definition:
                    iamActionDefinition:
                      policyArnSelector:
                        matchControllerRef: true
                        matchLabels: { agentos.io/component: deny-policy }
                      rolesSelector:
                        matchControllerRef: true
                        matchLabels: { agentos.io/component: tenant-role }
                  subscriber:
                    - subscriptionType: EMAIL
                      address: nathantilsley@gmail.com
