# AWS-light overrides to verify ADR-0030 durable, per-tenant cross-session memory in k3s.
# Real Bedrock (Haiku, DIRECT using the pod's aws-creds — no per-tenant role), everything else
# stripped to the minimum: local sandbox, open gate, in-memory stores, no OPA/controller/claims.
# Used by deploy/local/memory-k3s.sh.
image:
  pullPolicy: IfNotPresent # k3s containerd already has the ctr-imported agent-runtime:dev

runtime:
  replicas: 1
  env:
    REGION: eu-west-2
    INFERENCE_PROVIDER: bedrock
    MODEL_ID: eu.anthropic.claude-haiku-4-5-20251001-v1:0
    SANDBOX_PROVIDER: local # runs in-pod (demo) — avoids the agentcore dependency
    AGENT_REGISTRY: memory # no kube Agent CRs
    RUN_STORE: memory
    SPEND_STORE: memory
    GATE: noop # open: no token auth, no budget admission
    TELEMETRY: console
    # null ⇒ removed from the chart default env (Helm deep-merge): so noop guard, pod-cred
    # Bedrock (no role assumption), and AllowAll authz — none of the AWS control plane needed.
    GUARDRAIL_ID: null
    TENANT_ASSUME_ROLE: null
    AUTHZ: null
    OPA_URL: null
    GATE_BUDGET_SOURCE: null
    GATE_BUDGET_USD: null
  awsCredsSecret: aws-creds # the script creates this from the local profile (short-lived STS)
  gateTokensSecret: "" # no token auth under GATE=noop
  hpa:
    enabled: false # RWO PVC ⇒ single replica on the single colima node
  memory:
    enabled: true
    dir: /var/lib/agent-os/memory
    retrieval: keyword # files-first; no Titan embeddings needed to prove cross-session recall
    persistence:
      enabled: true
      size: 1Gi
      accessMode: ReadWriteOnce
      storageClass: "" # local-path (k3s default)

# everything below: off — not needed to prove memory persistence
opa:
  enabled: false
controller:
  enabled: false
claimPolicy:
  enabled: false
sampleAgents:
  enabled: false
networkPolicy:
  enabled: false
quota:
  enabled: false
