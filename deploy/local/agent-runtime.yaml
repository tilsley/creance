# agent-runtime workload — apply deploy/local/namespace.yaml FIRST.
# Same manifest applies on EKS — swap imagePullPolicy: Never for a registry image,
# bind the ServiceAccount to the IAM role via a Pod Identity association, and drop
# the aws-creds Secret (keyless).
---
# ServiceAccount — the workload identity. On EKS, a Pod Identity *association* binds
# this SA to the `agent-os-runtime` IAM role (CDK StateStack) → keyless DynamoDB +
# Bedrock access. Locally there's no Pod Identity, so creds come from aws-creds (see
# README §3) — the one piece that's genuinely EKS-only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-runtime
  namespace: agent-os
---
# ClusterRole — the runtime reads the *cluster-scoped* TenantInferenceProfile claims
# to source each tenant's monthlyBudgetUsd (GATE_BUDGET_SOURCE=kube; ADR-0013). This
# is the in-cluster SA-token path the KubeBudgetSource uses (vs. the namespaced
# agent-os.io Agent read, which agents.yaml grants).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-runtime-budget-reader
rules:
  - apiGroups: ["platform.agent-os.io"]
    resources: ["tenantinferenceprofiles"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-runtime-budget-reader
subjects:
  - kind: ServiceAccount
    name: agent-runtime
    namespace: agent-os
roleRef:
  kind: ClusterRole
  name: agent-runtime-budget-reader
  apiGroup: rbac.authorization.k8s.io
---
# ConfigMap — non-secret adapter selection (the ports/adapters seam as config).
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-runtime-config
  namespace: agent-os
data:
  REGION: eu-west-2
  INFERENCE_PROVIDER: bedrock
  MODEL_ID: amazon.nova-lite-v1:0
  SANDBOX_PROVIDER: agentcore # real isolation: Firecracker microVM per session (ADR-0006)
  RUN_STORE: dynamodb # durable RunStore — the StateStack table
  RUNS_TABLE: agent-os-runs
  SPEND_STORE: dynamodb # durable, monthly-windowed per-tenant spend counter (ADR-0013)
  SPEND_TABLE: agent-os-budgets # the StateStack budgets table
  TELEMETRY: console
  GATE: local # require Bearer auth + per-tenant budget (tokens in the gate-tokens Secret)
  GATE_BUDGET_SOURCE: kube # source each tenant's cap from its TenantInferenceProfile claim
  GATE_BUDGET_USD: "1.00" # fallback cap for tenants without a claim
  TENANT_ASSUME_ROLE: kube # assume each tenant's IAM role per run (agentos-<tenant>); ADR-0014
  GUARDRAIL_ID: svs60qf8fqff # AgentOsBedrock output -> guard = Bedrock Guardrails
  AGENT_REGISTRY: kube # resolve agents from Agent CRs (deploy/local/agents.yaml)
  AGENTS_NAMESPACE: agent-os
  # in-cluster: trust the cluster CA so the k8s client (Bun fetch) can call the API
  NODE_EXTRA_CA_CERTS: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  namespace: agent-os
spec:
  replicas: 1
  selector:
    matchLabels: { app: agent-runtime }
  template:
    metadata:
      labels: { app: agent-runtime }
    spec:
      serviceAccountName: agent-runtime
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000 # the `bun` user in oven/bun
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: agent-runtime
          image: agent-runtime:dev
          imagePullPolicy: Never # local docker image (k3s docker runtime); not a registry
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef: { name: agent-runtime-config }
            - secretRef: { name: aws-creds } # local only — EKS uses Pod Identity
            - secretRef: { name: gate-tokens, optional: true } # GATE_TOKENS=token:tenant:subject,…
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            # readOnlyRootFilesystem: true   # prod: + emptyDir mounts for /tmp & bun cache
          readinessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 2
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: agent-runtime
  namespace: agent-os
spec:
  selector: { app: agent-runtime }
  ports:
    - { port: 80, targetPort: 3000 }
---
# HorizontalPodAutoscaler — the pod-level scale lever (nodes scale via Karpenter on
# EKS). NOTE: needs metrics-server (k3s ships it; EKS needs the add-on).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-runtime
  namespace: agent-os
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-runtime
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
