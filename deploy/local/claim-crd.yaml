# InferenceClaim (ADR-0021) — "I want model X with budget Y", as policy, not provisioning.
# A tenant declares a grant; the gateway reads it (KubeClaimSource). Validation is the API
# SERVER's job (OpenAPI patterns + a CEL cross-field rule) — bad claims are rejected at
# `kubectl apply`, NO controller. (A controller is optional, only for status / aggregate quota.)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: inferenceclaims.agent-os.io
spec:
  group: agent-os.io
  scope: Cluster
  names:
    kind: InferenceClaim
    plural: inferenceclaims
    singular: inferenceclaim
    shortNames: [ic]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [tenant, serviceAccount, monthlyBudgetUsd]
              properties:
                tenant: { type: string, minLength: 1 }
                # the workload identity authorized for this tenant — apply-time format check
                serviceAccount: { type: string, pattern: "^system:serviceaccount:[^:]+:[^:]+$" }
                model: { type: string } # catalog alias (routing/enforcement is an ADR-0021 follow-up)
                # numeric strings (the AWS Budget MR also took strings); enforced by the API server
                monthlyBudgetUsd: { type: string, pattern: "^[0-9]+(\\.[0-9]+)?$" }
                sessionBudgetUsd: { type: string, pattern: "^[0-9]+(\\.[0-9]+)?$" }
              # CEL cross-field rule — a session cap can't exceed the monthly cap. Rejected at apply.
              x-kubernetes-validations:
                - rule: "!has(self.sessionBudgetUsd) || double(self.sessionBudgetUsd) <= double(self.monthlyBudgetUsd)"
                  message: "sessionBudgetUsd must not exceed monthlyBudgetUsd"
      additionalPrinterColumns:
        - { name: Tenant, type: string, jsonPath: .spec.tenant }
        - { name: Budget, type: string, jsonPath: .spec.monthlyBudgetUsd }
        - { name: ServiceAccount, type: string, jsonPath: .spec.serviceAccount }
