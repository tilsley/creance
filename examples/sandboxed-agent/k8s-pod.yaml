# The sandboxed agent AS A POD — Model B end to end, BEHIND THE EGRESS WALL (ADR-0020/0022).
# A REAL foreign coding CLI (Claude Code) runs INSIDE the sandbox as an opaque delegated agent;
# the runtime only launches-and-watches (runSandboxedAgent). Deployed into a namespace locked
# down by charts/sandbox (default-deny egress + a governed gateway door):
#   • think  → Claude Code → the in-cluster gateway's Anthropic /v1/messages wire → Bedrock  ✅ governed
#   • do     → Claude Code's write/bash tools; ARBITRARY egress is refused by the wall        ❌ contained
# It holds no model creds and no auth code: identity is a projected SA token the gateway verifies.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandboxed-agent
---
apiVersion: v1
kind: Pod
metadata:
  name: sandboxed-agent
  labels: { app: sandbox } # subject to the wall + its doors (gateway, proxy)
spec:
  serviceAccountName: sandboxed-agent
  restartPolicy: Never
  containers:
    - name: agent
      image: sandboxed-agent:dev # node + Claude Code + the compiled launcher binary
      imagePullPolicy: Never
      command: ["/usr/local/bin/launcher"] # the compiled Model B launcher; default task is baked in
      env:
        - { name: AGENT_TOKEN_FILE, value: /var/run/agent/token } # projected SA token
        - { name: AGENT_TENANT, value: "system:serviceaccount:agentos-sandbox:sandboxed-agent" } # hint; token is authoritative
        - { name: INFERENCE_GATEWAY_URL, value: "http://inference-gateway.agentos-gw:3100" } # cross-ns Bun gateway Service
        - { name: SANDBOX_PROVIDER, value: "local" } # the foreign CLI runs in-process, IN this walled pod
        - { name: INFERENCE_PROVIDER, value: "scripted" } # the launcher itself never calls a model — Claude Code does, via the gateway
        - { name: GATE, value: "noop" }
        - { name: TELEMETRY, value: "console" }
        - { name: HOME, value: "/tmp" } # Claude Code needs a writable config dir
      volumeMounts:
        - { name: gw-token, mountPath: /var/run/agent, readOnly: true }
      resources:
        requests: { cpu: 250m, memory: 512Mi }
        limits: { cpu: "1", memory: 1Gi }
  volumes:
    - name: gw-token
      projected:
        sources:
          - serviceAccountToken:
              audience: agent-os-gateway # must match the gateway's OIDC_SA_AUDIENCE
              expirationSeconds: 600
              path: token
