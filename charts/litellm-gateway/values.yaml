# LiteLLM gateway in k8s. The gateway is configured purely by env (ports/adapters seam).
# Default: verify real k8s ServiceAccount tokens against the cluster JWKS (M2, ADR-0026).
#   helm install litellm-gateway charts/litellm-gateway -n agentos-gw --create-namespace

image:
  repository: litellm-gateway
  tag: dev
  pullPolicy: Never # local docker image (k3s docker runtime); EKS: a registry repo
replicas: 1
servicePort: 4000

env:
  REGION: eu-west-2
  AWS_REGION: eu-west-2
  SPEND_STORE: dynamo
  SPEND_TABLE: agent-os-budgets
  # authn: real k8s SA tokens. PyJWKClient fetches the cluster JWKS over TLS — SSL_CERT_FILE
  # points it at the cluster CA (auto-mounted in every pod) so the fetch verifies.
  JWT_JWKS_URL: https://kubernetes.default.svc.cluster.local/openid/v1/jwks
  JWT_AUDIENCE: agent-os-gateway
  JWT_TENANT_CLAIM: sub
  SSL_CERT_FILE: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  # grant source: empty CLAIMS_STATIC ⇒ DynamoClaimSource (agent-os-claims). Override
  # CLAIMS_STATIC (json) for a dev/no-AWS run.
  CLAIMS_TABLE: agent-os-claims

# local creds for Bedrock + DynamoDB on the happy path (EKS: IRSA, set to "").
awsCredsSecret: aws-creds
