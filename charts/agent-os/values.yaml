# agent-os platform apps. Install:
#   helm install agent-os charts/agent-os -n agentos --create-namespace
# Local (k3s) defaults below; for EKS override image.pullPolicy/repository and the
# runtime.env adapters (e.g. real stores), and drop the local aws-creds secret (IRSA).

image:
  repository: agent-runtime
  tag: dev
  pullPolicy: Never # local k3s docker image; EKS: IfNotPresent/Always + a registry repo

runtime:
  enabled: true
  replicas: 1
  # adapter selection — the ports/adapters seam as config. Override per environment.
  # (AGENTS_NAMESPACE is injected as the release namespace by the template.)
  env:
    REGION: eu-west-2
    INFERENCE_PROVIDER: bedrock
    MODEL_ID: amazon.nova-lite-v1:0
    SANDBOX_PROVIDER: agentcore
    RUN_STORE: dynamodb
    RUNS_TABLE: agent-os-runs
    SPEND_STORE: dynamodb
    SPEND_TABLE: agent-os-budgets
    TELEMETRY: console
    GATE: local
    GATE_BUDGET_SOURCE: kube
    GATE_BUDGET_USD: "1.00"
    TENANT_ASSUME_ROLE: kube
    AUTHZ: opa
    OPA_URL: http://localhost:8181/v1/data/agentos/authz
    GUARDRAIL_ID: svs60qf8fqff
    AGENT_REGISTRY: kube
    NODE_EXTRA_CA_CERTS: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  # local-only credential secrets (envFrom). awsCreds: the StateStack role creds (EKS uses IRSA,
  # set false); gateTokens: GATE_TOKENS=token:tenant:subject,… (optional, created out of band).
  awsCredsSecret: aws-creds
  gateTokensSecret: gate-tokens
  # remember (ADR-0030): durable, per-tenant long-term memory as files. AGENT_MEMORY_DIR is mounted
  # here; the adapter creates one subdir per tenant under it (isolation). retrieval=keyword (cheap,
  # files-first) or =vector (Bedrock Titan embeddings, semantic). Set enabled:false to turn memory off.
  memory:
    enabled: true
    dir: /var/lib/agent-os/memory
    retrieval: keyword
    persistence:
      enabled: true # PVC so memory survives pod restarts; false ⇒ emptyDir (ephemeral, for testing)
      size: 1Gi
      # k3s default (local-path) is ReadWriteOnce — fine for the single-node POC (replicas:1). For
      # EKS scale-out (HPA >1 across nodes) use a ReadWriteMany class (EFS): set accessMode + storageClass.
      accessMode: ReadWriteOnce
      storageClass: "" # "" = the cluster default StorageClass
      existingClaim: "" # bring-your-own PVC instead of the chart creating one
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilization: 70

# Centralized tool/MCP gateway (ADR-0011 dir. b / ADR-0029) — `do`'s tool face as one shared,
# governed egress chokepoint: it holds the MCP connections, the per-tenant allowlist, and the broker
# creds; the runtime forwards only the caller's identity, so the agent pod holds no tool credential
# and opens no tool connection. When enabled, the template auto-injects TOOL_GATEWAY_URL into the
# runtime (it resolves external tools from here via GatewayToolProvider; built-in workspace/http
# tools stay local). Was a separate `helm install charts/tool-gateway`; folded in so the whole
# governed-egress topology is one chart.
#
# Opt-in (default off) because it couples to the runtime's authn: the runtime forwards the caller's
# token to the gateway, so the runtime must use a TOKEN-PRESERVING authn (runtime.env.AUTHN=oidc-sa
# or mesh) — under the default `token` authn principal.token is empty and the gateway would 401.
# oidc-sa is the matched scheme: both verify the caller's SA token via TokenReview under one audience.
toolGateway:
  enabled: false
  image:
    repository: tool-gateway
    tag: dev
    pullPolicy: Never # local k3s docker image; EKS: IfNotPresent/Always + a registry repo
  replicas: 1
  servicePort: 3200
  # config (env) — the ports/adapters seam, mirrors charts/tool-gateway. Credential-light: no AWS.
  env:
    # Bun's fetch needs the cluster CA for the in-pod TokenReview (else SELF_SIGNED_CERT_IN_CHAIN).
    NODE_EXTRA_CA_CERTS: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    AUTHN: oidc-sa # TokenReview the caller's SA token (same audience as the runtime forwards)
    OIDC_SA_AUDIENCE: agent-os-gateway
    CLAIM_SOURCE: static # SA→tenant binding; the gateway needs no budget claims / CRD RBAC
    CLAIMS_STATIC: "{}" # e.g. '{"system:serviceaccount:ns:sa":{}}' — bind caller SAs to a tenant
    CRED_BROKER: noop # downstream tool creds: none by default; local/vault to inject scoped creds
    # the fronted MCP servers + per-tenant `tenants` allowlist (default-deny). Demo "orders" server,
    # stdio, spawned in-pod (the image carries bun + examples/). Scope `tenants` per real install.
    MCP_SERVERS: '{"orders":{"transport":"stdio","command":"bun","args":["run","examples/mcp-gateway/mock-mcp-server.ts"]}}'
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

# OPA policy sidecar (ADR-0015) — allow/deny over loopback.
opa:
  enabled: true
  image: openpolicyagent/opa:latest

# the agent control-plane reconciler (ADR-0012) — same image, different entrypoint.
controller:
  enabled: true
  reconcileIntervalMs: "10000"
  resources:
    requests: { cpu: 50m, memory: 96Mi }
    limits: { cpu: 200m, memory: 256Mi }

# the per-tenant compute bounds (pairs with the per-tenant $ budget).
quota:
  enabled: true
  requestsCpu: "2"
  requestsMemory: 2Gi
  limitsCpu: "4"
  limitsMemory: 4Gi
  pods: "10"

# the gate's k8s-side ingress containment (default-deny except :3000 in-namespace).
networkPolicy:
  enabled: true

# install the InferenceClaim VAP + sample Agent CRs (math-helper / haiku-writer).
claimPolicy:
  enabled: true
sampleAgents:
  enabled: true
