{{- if .Values.controller.enabled }}
# the agent control-plane reconciler (ADR-0012) — same image, different entrypoint.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-controller
rules:
  - apiGroups: ["agent-os.io"]
    resources: ["agents"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["agent-os.io"]
    resources: ["agents/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-controller
subjects:
  - kind: ServiceAccount
    name: agent-controller
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: agent-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-controller-config
data:
  AGENTS_NAMESPACE: {{ .Release.Namespace | quote }}
  RECONCILE_INTERVAL_MS: {{ .Values.controller.reconcileIntervalMs | quote }}
  NODE_EXTRA_CA_CERTS: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-controller
spec:
  replicas: 1
  selector:
    matchLabels: { app: agent-controller }
  template:
    metadata:
      labels: { app: agent-controller }
    spec:
      serviceAccountName: agent-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: agent-controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bun", "run", "services/agent-controller/controller.ts"]
          envFrom:
            - configMapRef: { name: agent-controller-config }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources: {{ .Values.controller.resources | toYaml | nindent 12 }}
{{- end }}
