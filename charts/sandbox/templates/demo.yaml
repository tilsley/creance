{{- if .Values.demo.enabled }}
# Demo/test only: a gateway stand-in (the real one is the inference gateway), the
# gateway egress door, and a sandbox pod (Model-B-shaped) with curl to run the checks.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-sandbox-to-gateway
spec:
  podSelector:
    matchLabels: { app: sandbox }
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels: { app: gateway }
      ports:
        - { port: 80, protocol: TCP }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector: { matchLabels: { app: gateway } }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
        - name: echo
          image: {{ .Values.demo.gatewayImage | quote }}
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { cpu: 200m, memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector: { app: gateway }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: v1
kind: Pod
metadata:
  name: sandbox
  labels: { app: sandbox }
spec:
  containers:
    - name: box
      image: {{ .Values.demo.sandboxImage | quote }}
      command: ["sleep", "infinity"]
      resources:
        requests: { cpu: 50m, memory: 32Mi }
        limits: { cpu: 200m, memory: 64Mi }
{{- end }}
