# Sandbox egress lockdown — no anonymous egress (ADR-0020/0022).
# Install:  helm install sandbox charts/sandbox -n agentos-sandbox --create-namespace

proxy:
  image: ubuntu/squid:6.6-24.04_edge
  # the named outbound domains a coding agent legitimately needs (the allowlist).
  # Everything else is denied at the proxy; non-proxy egress is denied at the wall.
  allowDomains:
    - .npmjs.org
    - .pypi.org
    - .pythonhosted.org
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 300m, memory: 192Mi }

# The governed door — the ONE outbound a real sandbox pod gets besides the proxy: the
# inference gateway, in its own namespace. `think` traverses the wall through this; the model
# call + creds live on the far side. Off by default (the demo uses its in-namespace stand-in);
# turn on for a real sandbox that talks to the deployed gateway (charts/inference-gateway).
gateway:
  enabled: false
  namespace: agentos-gw # where charts/inference-gateway runs (selected by kubernetes.io/metadata.name)
  podLabel: inference-gateway # the gateway pod's `app` label
  port: 3100

# Demo/test pods: a gateway stand-in + a sandbox pod (+ the gateway egress door).
# Disable for a real sandbox namespace (you bring your own workloads).
demo:
  enabled: true
  gatewayImage: nginx:alpine
  sandboxImage: curlimages/curl:8.11.1
